version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kashe-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: kashe_db
    volumes:
      - kashe_pg_data:/var/lib/postgresql/data

volumes:
  kashe_pg_data: # This ensures your data isn't deleted when the container stops
